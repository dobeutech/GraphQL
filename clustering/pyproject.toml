[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "N",   # pep8-naming
    "RUF", # ruff-specific rules
]
ignore = [
    "E501",  # line too long (handled by formatter)
    "B008",  # do not perform function calls in default arguments (Flask patterns)
]

[tool.ruff.lint.per-file-ignores]
"clustering_service.py" = [
    "N803", # argument name should be lowercase (numpy convention uses uppercase)
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
