global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'neo4j'
    static_configs:
      - targets: ['neo4j:2004']

  - job_name: 'graphql'
    static_configs:
      - targets: ['graphql-server:4000']
    metrics_path: '/metrics'

  - job_name: 'qdrant'
    static_configs:
      - targets: ['qdrant:6333']
    metrics_path: '/metrics'

  - job_name: 'clustering'
    static_configs:
      - targets: ['clustering-service:8081']
    metrics_path: '/metrics'
